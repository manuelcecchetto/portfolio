<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Oddity Creative</title>
    <style vid="5">
        :root {
            --bg-bone: #EAE8E4;
            --ink-black: #111111;
            --stroke-width: 1.5px;
            --spacing-unit: 8px;
            --font-main: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-bone);
            color: var(--ink-black);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            cursor: crosshair; 
        }

        
        h1, h2, h3, p, a {
            color: var(--ink-black);
            letter-spacing: -0.02em;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .nav-link {
            font-size: 1rem;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .nav-link:hover {
            border-bottom: 1px solid var(--ink-black);
        }

        .display-text {
            font-size: 3.5rem;
            line-height: 0.95;
            font-weight: 500;
            margin-bottom: var(--spacing-unit);
        }

        .body-text {
            font-size: 1.35rem; 
            line-height: 1.4;
            max-width: 90%;
            margin-top: 2rem;
        }

        
        header {
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            background: transparent; 
            pointer-events: none; 
        }

        header > * {
            pointer-events: auto;
        }

        main {
            padding: 24px;
            padding-top: 120px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        
        
        .doodle-container {
            width: 120px;
            height: 120px;
            margin-bottom: 40px;
            position: relative;
        }
        
        .doodle-path {
            fill: none;
            stroke: var(--ink-black);
            stroke-width: var(--stroke-width);
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        
        @keyframes subtle-wiggle {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(2deg) scale(1.02); }
            50% { transform: rotate(-1deg) scale(0.98); }
            75% { transform: rotate(1deg) scale(1.01); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-wiggle {
            animation: subtle-wiggle 6s ease-in-out infinite;
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        
        .menu-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .menu-item {
            font-size: 3rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            width: fit-content;
        }

        .menu-item:hover {
            transform: skewX(-5deg) translateX(10px);
            font-style: italic;
        }
        
        .menu-item:active {
            transform: scale(0.95);
        }

        
        
        .image-module {
            margin-top: 60px;
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        .image-module img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(110%);
            transition: filter 0.5s ease;
        }

        .image-module:hover img {
            filter: grayscale(0%) contrast(100%);
        }

        
        .scribble-decor {
            position: absolute;
            bottom: -20px;
            right: -10px;
            width: 80px;
            height: 80px;
            z-index: 5;
            pointer-events: none;
        }

        
        .spacer {
            height: 100px;
        }
        
        .underline {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        
        #surprise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

    </style>
</head>
<body vid="6">

    
    <canvas id="surprise-canvas" vid="7"></canvas>

    <header vid="8">
        <div class="logo" vid="9">oddity.</div>
        <a href="#" class="nav-link" vid="10">Index</a>
    </header>

    <main vid="11">
        
        
        <div class="doodle-container animate-wiggle" vid="12">
            <svg viewBox="0 0 100 100" class="doodle-path" vid="13">
                
                <path d="M30,70 C20,70 15,60 15,50 C15,30 30,10 50,10 C70,10 85,30 85,50 C85,60 80,70 70,70" vid="14"></path>
                
                <path d="M35,70 L30,85 M65,70 L70,85" vid="15"></path>
                
                <circle cx="40" cy="40" r="2" fill="var(--ink-black)" stroke="none" vid="16"></circle>
                <circle cx="60" cy="40" r="2" fill="var(--ink-black)" stroke="none" vid="17"></circle>
                <path d="M45,55 Q50,60 55,55" vid="18"></path>
                
                <path d="M50,10 Q50,0 60,0" vid="19"></path>
                <circle cx="60" cy="0" r="3" vid="20"></circle>
            </svg>
        </div>

        <div class="menu-stack" vid="21">
            <div class="menu-item" vid="22">Think,</div>
            <div class="menu-item" vid="23">Make,</div>
            <div class="menu-item" vid="24">Break,</div>
            <div class="menu-item" vid="25">Repeat</div>
        </div>

        <div class="body-text" vid="26">
            Oddity works with <span class="underline" vid="27">curious minds</span> to dismantle the mundane. We design digital toys that stretch logic, encourage misinterpretation, and find utility in the useless.
        </div>

        <div class="image-module" vid="28">
            
            <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=800&amp;q=80" alt="Child playing" vid="29">
            
            <div class="scribble-decor animate-float" vid="30">
                <svg viewBox="0 0 100 100" class="doodle-path" vid="31">
                    
                    <path d="M50,50 m-20,0 a20,20 0 1,0 40,0 a20,20 0 1,0 -40,0" style="stroke-dasharray: 4,4; opacity: 0.5" vid="32"></path>
                    <path d="M50,20 L50,80 M20,50 L80,50 M30,30 L70,70 M70,30 L30,70" vid="33"></path>
                </svg>
            </div>
        </div>

        <div class="spacer" vid="34"></div>
        
        <div class="doodle-container" style="align-self: flex-end; width: 60px; height: 60px;" vid="35">
             <svg viewBox="0 0 50 50" class="doodle-path" vid="36">
                
                <path d="M10,40 Q25,10 40,40 Q25,50 10,40" vid="37"></path>
                <path d="M10,40 L5,35 M40,40 L45,35" vid="38"></path>
            </svg>
        </div>

    </main>

    <script vid="39">
        
        
        
        
        const canvas = document.getElementById('surprise-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resize);
        resize();

        const points = [];
        
        function drawDoodle(x, y) {
            
            const type = Math.random();
            ctx.strokeStyle = '#111111'; 
            ctx.lineWidth = 1;
            ctx.beginPath();

            if (type < 0.33) {
                
                ctx.arc(x, y, Math.random() * 3, 0, Math.PI * 2);
            } else if (type < 0.66) {
                
                const s = 3;
                ctx.moveTo(x - s, y - s);
                ctx.lineTo(x + s, y + s);
                ctx.moveTo(x + s, y - s);
                ctx.lineTo(x - s, y + s);
            } else {
                
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.random() * 5, y + Math.random() * 5);
            }
            ctx.stroke();
        }

        let lastX = 0;
        let lastY = 0;

        function handleMove(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!x || !y) return;

            
            const dist = Math.hypot(x - lastX, y - lastY);
            if (dist > 30) {
                drawDoodle(x, y);
                lastX = x;
                lastY = y;
            }
        }

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);

    </script>

</body></html>
